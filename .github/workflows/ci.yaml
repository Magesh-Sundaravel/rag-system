name: CI

on:
  pull_request:

jobs:
  python:
    name: lint + test (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - ingestion-service
          - embedding-service
          - retrieval-service
          - api-gateway
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      # No --extra ml: torch/sentence-transformers are mocked in tests.
      - run: uv sync

      - name: ruff check
        run: uv run ruff check .

      - name: ruff format --check
        run: uv run ruff format --check .

      - name: pytest
        run: uv run pytest -q

  frontend:
    name: frontend syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: |
          node --check frontend/src/api.js
          node --check frontend/src/app.js
