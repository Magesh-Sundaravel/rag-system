name: CD

on:
  push:
    branches: [main]

# OIDC federation into AWS (no long-lived keys).
permissions:
  id-token: write
  contents: read

jobs:
  build:
    name: build + push (${{ matrix.image }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { context: services/auth-service, image: rag-auth-service }
          - { context: services/ingestion-service, image: rag-ingestion-service }
          - { context: services/embedding-service, image: rag-embedding-service }
          - { context: services/retrieval-service, image: rag-retrieval-service }
          - { context: services/api-gateway, image: rag-api-gateway }
          - { context: frontend, image: rag-frontend }
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          IMAGE: ${{ matrix.image }}
          TAG: ${{ github.sha }}
        run: |
          docker build -t "$REGISTRY/$IMAGE:$TAG" -t "$REGISTRY/$IMAGE:latest" "${{ matrix.context }}"
          docker push "$REGISTRY/$IMAGE:$TAG"
          docker push "$REGISTRY/$IMAGE:latest"

  deploy:
    name: deploy to EKS
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Configure kubectl
        run: aws eks update-kubeconfig --name "${{ vars.EKS_CLUSTER }}" --region "${{ vars.AWS_REGION }}"

      - name: Install envsubst
        run: sudo apt-get update && sudo apt-get install -y gettext-base

      - name: Render manifests and apply
        env:
          ECR_REGISTRY: ${{ steps.ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
          AWS_REGION: ${{ vars.AWS_REGION }}
          AWS_IRSA_ROLE_ARN: ${{ secrets.AWS_IRSA_ROLE_ARN }}
          S3_BUCKET: ${{ vars.S3_BUCKET }}
          SQS_QUEUE_URL: ${{ vars.SQS_QUEUE_URL }}
          PUBLIC_HOST: ${{ vars.PUBLIC_HOST }}
        run: |
          set -euo pipefail
          # Only substitute our placeholders; $(VAR) k8s-side refs are preserved.
          SUBST='${ECR_REGISTRY} ${IMAGE_TAG} ${AWS_REGION} ${AWS_IRSA_ROLE_ARN} ${S3_BUCKET} ${SQS_QUEUE_URL} ${PUBLIC_HOST}'
          apply() { envsubst "$SUBST" < "$1" | kubectl apply -f -; }

          # Order matters: namespaces and cluster-scoped resources first.
          apply k8s/namespace.yaml
          apply k8s/storageclass.yaml
          apply k8s/serviceaccount.yaml
          for f in k8s/external-secrets/*.yaml; do apply "$f"; done
          for f in k8s/postgres/*.yaml; do apply "$f"; done
          for d in auth ingestion embedding retrieval gateway frontend; do
            for f in k8s/$d/*.yaml; do apply "$f"; done
          done
          for f in k8s/ingress/*.yaml; do apply "$f"; done

          kubectl -n rag-prod rollout status deploy/api-gateway --timeout=180s
