# Local development infrastructure only (no AWS required).
# Services are added here as they are built.
name: rag-system

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
      POSTGRES_DB: rag
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag -d rag"]
      interval: 5s
      timeout: 3s
      retries: 10

  localstack:
    image: localstack/localstack:3
    environment:
      SERVICES: s3,sqs
    ports:
      - "4566:4566"

  # All-in-one local telemetry backend: OTLP Collector + Prometheus + Tempo +
  # Loki + Grafana. Point services at OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4317.
  # Grafana UI: http://localhost:3000 (anonymous access, no login).
  otel-lgtm:
    image: grafana/otel-lgtm:0.8.1
    ports:
      - "3000:3000"   # Grafana
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP

volumes:
  pgdata:
