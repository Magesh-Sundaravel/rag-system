apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingestion-service
  namespace: rag-prod
  labels:
    app: ingestion-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ingestion-service
  template:
    metadata:
      labels:
        app: ingestion-service
    spec:
      serviceAccountName: rag-aws
      containers:
        - name: ingestion-service
          image: ${ECR_REGISTRY}/rag-ingestion-service:${IMAGE_TAG}
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: ingestion-config
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rag-secrets
                  key: POSTGRES_PASSWORD
            - name: INGEST_DATABASE_URL
              value: "postgresql+psycopg://rag:$(POSTGRES_PASSWORD)@postgres:5432/rag"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
