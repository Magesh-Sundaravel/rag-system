apiVersion: apps/v1
kind: Deployment
metadata:
  name: embedding-service
  namespace: rag-prod
  labels:
    app: embedding-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: embedding-service
  template:
    metadata:
      labels:
        app: embedding-service
    spec:
      serviceAccountName: rag-aws
      containers:
        - name: embedding-service
          image: ${ECR_REGISTRY}/rag-embedding-service:${IMAGE_TAG}
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: embedding-config
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rag-secrets
                  key: POSTGRES_PASSWORD
            - name: EMBED_DATABASE_URL
              value: "postgresql+psycopg://rag:$(POSTGRES_PASSWORD)@postgres:5432/rag"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
          # bge-large + torch held in memory; sized accordingly.
          resources:
            requests:
              cpu: "500m"
              memory: "2Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
