apiVersion: apps/v1
kind: Deployment
metadata:
  name: retrieval-service
  namespace: rag-prod
  labels:
    app: retrieval-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: retrieval-service
  template:
    metadata:
      labels:
        app: retrieval-service
    spec:
      containers:
        - name: retrieval-service
          image: ${ECR_REGISTRY}/rag-retrieval-service:${IMAGE_TAG}
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: retrieval-config
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rag-secrets
                  key: POSTGRES_PASSWORD
            - name: RETRIEVE_DATABASE_URL
              value: "postgresql+psycopg://rag:$(POSTGRES_PASSWORD)@postgres:5432/rag"
            - name: RETRIEVE_GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: rag-secrets
                  key: GROQ_API_KEY
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: "500m"
              memory: "2Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
