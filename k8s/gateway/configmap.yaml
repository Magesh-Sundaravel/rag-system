apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-config
  namespace: rag-prod
data:
  GATEWAY_AUTH_URL: "http://auth-service:8000"
  GATEWAY_INGESTION_URL: "http://ingestion-service:8000"
  GATEWAY_RETRIEVAL_URL: "http://retrieval-service:8000"
  GATEWAY_RATE_LIMIT: "100/minute"
  # JSON array (pydantic-settings parses list fields as JSON).
  GATEWAY_CORS_ORIGINS: '["https://${PUBLIC_HOST}"]'
