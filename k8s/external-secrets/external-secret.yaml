# Pulls one AWS Secrets Manager secret (JSON) into the k8s Secret `rag-secrets`.
# The AWS secret `rag/prod/app` must contain keys: GROQ_API_KEY, JWT_SECRET, POSTGRES_PASSWORD.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: rag-secrets
  namespace: rag-prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets
    kind: SecretStore
  target:
    name: rag-secrets
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: rag/prod/app
