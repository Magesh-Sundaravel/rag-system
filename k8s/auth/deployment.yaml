apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: rag-prod
  labels:
    app: auth-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: ${ECR_REGISTRY}/rag-auth-service:${IMAGE_TAG}
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: auth-config
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rag-secrets
                  key: POSTGRES_PASSWORD
            - name: AUTH_DATABASE_URL
              value: "postgresql+psycopg://rag:$(POSTGRES_PASSWORD)@postgres:5432/rag"
            - name: AUTH_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: rag-secrets
                  key: JWT_SECRET
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
